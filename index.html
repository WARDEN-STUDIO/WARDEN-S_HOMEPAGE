<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARDEN'S WWW</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

input {
    width: 500px;
    max-width: 80vw;
    padding: 12px;
    background: #111;
    color: white;
    border: 1px solid white;
    border-radius: 5px;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    margin-left: 10px;
    background: white;
    color: black;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #ddd;
}
</style>
</head>
<body>

<div class="container">
    <h1>WARDEN'S WWW</h1>

    <form action="https://www.google.com/search" method="GET">
        <input type="text" name="q" placeholder="Search the web...">
        <button type="submit">SEARCH</button>
    </form>
</div>

</body>
</html>
